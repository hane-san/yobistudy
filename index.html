<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>予備試験 一問一答カード</title>
<link rel="stylesheet" href="style.css">

<link rel="icon" href="assets/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.svg">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#7f6cff">
</head>
<body>
<div class="app">
  <header>
    <div class="topbar"><p class="tinyTitle">予備試験 一問一答カード</p></div>
    <div class="selectRow">
      <label class="selectBox">科目<select id="subjectSelect"></select></label>
      <label class="selectBox"><span id="filterLabel">条文番号</span><select id="categorySelect"></select></label>
    </div>
  </header>
  <div class="miniPlayerSlot" aria-hidden="true"><div class="miniPlayerFrame"></div></div>
  <main id="categoryView"></main>
  <main id="randomView" hidden>
    <div class="randomWrap">
      <div class="sectionHead pagerHead randomSpacer" aria-hidden="true"><h2>ランダム</h2><span class="count">&nbsp;</span></div>
      <article id="randomCard" class="randomCard" role="button" aria-label="ランダムカードを読み上げる" tabindex="0"></article>
      <div class="controls">
        <button id="shrinkBtnRandom" class="mini shrinkBtn" type="button">長押しで全文表示</button>
      </div>
    </div>
  </main>
  <nav class="bottomNav" aria-label="表示モード切替">
    <button id="categoryBtn" type="button">カテゴリ</button>
    <button id="articleBtn" type="button">条文番号</button>
    <button id="randomBtn" class="active" type="button">ランダム</button>
  </nav>
</div>
<script>window.CARD_FILES = ["cards/company.json", "cards/minso.json", "cards/minso_oral.json", "cards/minso_records.json", "cards/minso_evidence.json", "cards/minso_benron.json", "cards/minso_procedure.json"];</script>
<script src="app.js" type="module"></script>
<script>
(() => {
  const openRandom = () => document.getElementById('randomBtn')?.click();
  window.addEventListener('load', () => {
    openRandom();
    setTimeout(openRandom, 80);
    setTimeout(openRandom, 260);
  }, { once: true });

  let sx = 0;
  let sy = 0;
  let st = 0;
  document.addEventListener('touchstart', event => {
    if (!document.getElementById('randomBtn')?.classList.contains('active')) return;
    const t = event.changedTouches && event.changedTouches[0];
    if (!t) return;
    sx = t.clientX;
    sy = t.clientY;
    st = Date.now();
  }, { capture: true, passive: true });

  document.addEventListener('touchend', event => {
    if (!document.getElementById('randomBtn')?.classList.contains('active')) return;
    const stage = event.target && event.target.closest && event.target.closest('#pagerStage');
    if (!stage) return;
    const t = event.changedTouches && event.changedTouches[0];
    if (!t) return;
    const dx = t.clientX - sx;
    const dy = t.clientY - sy;
    const dt = Math.max(Date.now() - st, 1);
    const absX = Math.abs(dx);
    const absY = Math.abs(dy);
    const dist = Math.max(absX, absY);
    const velocity = dist / dt;
    const isSwipe = dist >= 26 && (dt <= 300 || velocity >= 0.2);
    if (isSwipe && absY >= absX * 0.72) {
      event.preventDefault();
      event.stopImmediatePropagation();
      openRandom();
    }
  }, { capture: true, passive: false });
})();
</script>
</body>
</html>
